<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Difference App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: #4c93ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow">
                    <h2 class="text-center mb-4">Date Difference Calculator</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Select First Date</label>
                            <input type="date" name="date1" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Select Second Date</label>
                            <input type="date" name="date2" class="form-control" required>
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary" type="submit">Calculate</button>
                        </div>
                    </form>
                    
                    {% if result %}
                    <div class="alert alert-success text-center mt-4">
                        {{ result }}
                    </div>
                    {% endif %}
                    {% if error %}
                    <div class="alert alert-danger text-center mt-4">
                        {{ error }}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
