<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Yourself</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: Arial; text-align: center; }
        #map { height: 400px; margin-top: 10px; }
        input { padding: 8px; width: 250px; }
        button { padding: 8px 12px; margin: 5px; }
    </style>
</head>
<body>

<h1>Locate Me</h1>

<div>
  <input type="text" id="location-input" placeholder="Enter a city e.g. London">
  <button id="search-btn">Search</button>
</div>

<p id="status"></p>

<div>
  <button id="locate-btn">Locate Me</button>
  <button id="reset-btn">Reset Map</button>
</div>

<div id="map"></div>

<script>
const map = L.map("map").setView([0, 0], 2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap"
}).addTo(map);

let markers = [];

document.getElementById("search-btn").addEventListener("click", () => {
    const location = document.getElementById("location-input").value.trim();
    const status = document.getElementById("status");

    if (!location) {
        status.textContent = "Enter a location";
        return;
    }

    status.textContent = "Searching...";

    fetch("/geocode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ location })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            status.textContent = data.error;
            return;
        }

        const { lat, lon, display_name } = data;

        map.setView([lat, lon], 10);

        const marker = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(display_name)
            .openPopup();

        markers.push(marker);

        status.textContent = `Found: ${display_name}`;
    })
    .catch(err => {
        console.error(err);
        status.textContent = "Error searching location";
    });
});

document.getElementById("locate-btn").addEventListener("click", () => {
    const status = document.getElementById("status");

    if (!navigator.geolocation) {
        status.textContent = "Geolocation not supported";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            map.setView([lat, lon], 13);

            const marker = L.marker([lat, lon])
                .addTo(map)
                .bindPopup("You are here")
                .openPopup();

            markers.push(marker);

            status.textContent = "Location found";
        },
        err => {
            console.error(err);
            status.textContent = "Unable to get location";
        }
    );
});

document.getElementById("reset-btn").addEventListener("click", () => {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    map.setView([0, 0], 2);
    document.getElementById("status").textContent = "Map reset";
});
</script>
</body>
</html>
